name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet restore tests/MauiMessenger.Api.Tests/MauiMessenger.Api.Tests.csproj
          dotnet restore tests/MauiMessenger.Client.Web.Tests/MauiMessenger.Client.Web.Tests.csproj

      - name: Run API tests
        run: dotnet test tests/MauiMessenger.Api.Tests/MauiMessenger.Api.Tests.csproj --no-restore --logger "trx;LogFileName=api-tests.trx"

      - name: Build web tests
        run: dotnet build tests/MauiMessenger.Client.Web.Tests/MauiMessenger.Client.Web.Tests.csproj --no-restore

      - name: Install Playwright browsers
        run: pwsh tests/MauiMessenger.Client.Web.Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run web tests
        run: xvfb-run dotnet test tests/MauiMessenger.Client.Web.Tests/MauiMessenger.Client.Web.Tests.csproj --no-build --logger "trx;LogFileName=web-tests.trx"
